name: Check Config Attachment

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  check-config-attachment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check attachment status
        id: check_attachment
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            let attachmentFound = false;
            let fileAccessible = false;
            let fileUrl = '';
            let fileName = '';

            // Регулярное выражение для поиска любых файлов config*.tar.gz
            // Ищет ссылки вида [filename](url) где filename содержит config и заканчивается на .tar.gz
            const markdownRegex = /\[(config[^\]]*\.tar\.gz)\]\((https?:\/\/[^\s)]+)\)/gi;
            const matches = [...issue.data.body.matchAll(markdownRegex)];

            if (matches && matches.length > 0) {
              // Берем первый найденный файл (можно изменить логику, если нужно проверять все)
              const firstMatch = matches[0];
              fileName = firstMatch[1];
              fileUrl = firstMatch[2];
              attachmentFound = true;
              
              try {
                const response = await fetch(fileUrl, { method: 'HEAD' });
                if (response.ok) {
                  fileAccessible = true;
                }
              } catch (error) {
                fileAccessible = false;
              }
            }

            core.setOutput('attachment_found', attachmentFound.toString());
            core.setOutput('file_accessible', fileAccessible.toString());
            core.setOutput('file_url', fileUrl);
            core.setOutput('file_name', fileName);

      - name: Extract and verify archive contents
        id: verify_archive
        if: steps.check_attachment.outputs.attachment_found == 'true' && steps.check_attachment.outputs.file_accessible == 'true'
        env:
          FILE_URL: ${{ steps.check_attachment.outputs.file_url }}
          FILE_NAME: ${{ steps.check_attachment.outputs.file_name }}
        run: |
          set -e
          echo "Downloading $FILE_NAME from $FILE_URL..."
          curl -L -s -o "/tmp/config.tar.gz" "$FILE_URL"

          if [ ! -s "/tmp/config.tar.gz" ]; then
            echo "ERROR: Downloaded file is empty or does not exist."
            echo "file_valid=false" >> $GITHUB_OUTPUT
            echo "verification_error=Archive '$FILE_NAME' is empty or failed to download." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Extracting archive to verify contents..."
          EXTRACT_DIR=$(mktemp -d)
          cd "$EXTRACT_DIR"

          if ! tar -xzf /tmp/config.tar.gz 2>/dev/null; then
            echo "ERROR: Failed to extract $FILE_NAME."
            echo "file_valid=false" >> $GITHUB_OUTPUT
            echo "verification_error=Failed to extract archive '$FILE_NAME'. File may be corrupted." >> $GITHUB_OUTPUT
            exit 0
          fi

          REQUIRED_FILE="opt/config/mod_data/log/console.log"
          if [ ! -f "$EXTRACT_DIR/$REQUIRED_FILE" ]; then
            echo "ERROR: Required file '$REQUIRED_FILE' NOT found."
            echo "file_valid=false" >> $GITHUB_OUTPUT
            echo "verification_error=The archive '$FILE_NAME' does not contain the required file: $REQUIRED_FILE" >> $GITHUB_OUTPUT
            rm -rf "$EXTRACT_DIR"
            rm -f "/tmp/config.tar.gz"
            exit 0
          fi
          echo "SUCCESS: Required file '$REQUIRED_FILE' found."

          if grep -q -i "bambufy" "$EXTRACT_DIR/$REQUIRED_FILE"; then
            echo "ERROR: Bambufy plugin detected in console.log"
            echo "file_valid=false" >> $GITHUB_OUTPUT
            echo "verification_error=Bambufy plugin detected in '$FILE_NAME'" >> $GITHUB_OUTPUT
            echo "bambufy_detected=true" >> $GITHUB_OUTPUT
            rm -rf "$EXTRACT_DIR"
            rm -f "/tmp/config.tar.gz"
            exit 0
          fi
          echo "bambufy_detected=false" >> $GITHUB_OUTPUT

          if grep -q -i "lesswaste" "$EXTRACT_DIR/$REQUIRED_FILE"; then
            echo "ERROR: LessWaste plugin detected in console.log"
            echo "file_valid=false" >> $GITHUB_OUTPUT
            echo "verification_error=LessWaste plugin detected in '$FILE_NAME'" >> $GITHUB_OUTPUT
            echo "lesswaste_detected=true" >> $GITHUB_OUTPUT
            rm -rf "$EXTRACT_DIR"
            rm -f "/tmp/config.tar.gz"
            exit 0
          fi
          echo "lesswaste_detected=false" >> $GITHUB_OUTPUT

          VERSION_CHECK_MESSAGE=""
          VERSION_OUTDATED="false"

          VERSION_FILE_5X="opt/config/mod/version_5x.txt"
          REMOTE_VERSION_URL_5X="https://raw.githubusercontent.com/ghzserg/z_ad5x/refs/heads/1.7/version_5x.txt"

          if [ -f "$EXTRACT_DIR/$VERSION_FILE_5X" ]; then
            echo "Found $VERSION_FILE_5X, checking version..."
            LOCAL_VERSION_5X=$(cat "$EXTRACT_DIR/$VERSION_FILE_5X" | xargs)
            REMOTE_VERSION_5X=$(curl -s -f "$REMOTE_VERSION_URL_5X" | xargs)

            if [ -z "$REMOTE_VERSION_5X" ]; then
              echo "WARNING: Could not fetch remote version from $REMOTE_VERSION_URL_5X"
              VERSION_CHECK_MESSAGE="⚠️ Could not check for updates (failed to fetch latest version)."
            elif [ "$LOCAL_VERSION_5X" != "$REMOTE_VERSION_5X" ]; then
              echo "OUTDATED: Local version ($LOCAL_VERSION_5X) differs from remote ($REMOTE_VERSION_5X)."
              VERSION_OUTDATED="true"
              VERSION_CHECK_MESSAGE="Your mod version **$LOCAL_VERSION_5X** does not match the latest version **$REMOTE_VERSION_5X**."
            else
              echo "UP-TO-DATE: Version $LOCAL_VERSION_5X is current."
              VERSION_CHECK_MESSAGE="Your mod version **$LOCAL_VERSION_5X** is up to date."
            fi

          else
            VERSION_FILE_5M="opt/config/mod/version_5m.txt"
            REMOTE_VERSION_URL_5M="https://raw.githubusercontent.com/ghzserg/z_ff5m/refs/heads/1.7/version_5m.txt"

            if [ -f "$EXTRACT_DIR/$VERSION_FILE_5M" ]; then
              echo "Found $VERSION_FILE_5M, checking version..."
              LOCAL_VERSION_5M=$(cat "$EXTRACT_DIR/$VERSION_FILE_5M" | xargs)
              REMOTE_VERSION_5M=$(curl -s -f "$REMOTE_VERSION_URL_5M" | xargs)

              if [ -z "$REMOTE_VERSION_5M" ]; then
                echo "WARNING: Could not fetch remote version from $REMOTE_VERSION_URL_5M"
                VERSION_CHECK_MESSAGE="⚠️ Could not check for updates (failed to fetch latest version)."
              elif [ "$LOCAL_VERSION_5M" != "$REMOTE_VERSION_5M" ]; then
                echo "OUTDATED: Local version ($LOCAL_VERSION_5M) differs from remote ($REMOTE_VERSION_5M)."
                VERSION_OUTDATED="true"
                VERSION_CHECK_MESSAGE="Your mod version **$LOCAL_VERSION_5M** does not match the latest version **$REMOTE_VERSION_5M**."
              else
                echo "UP-TO-DATE: Version $LOCAL_VERSION_5M is current."
                VERSION_CHECK_MESSAGE="Your mod version **$LOCAL_VERSION_5M** is up to date."
              fi

            else
              echo "ERROR: No version file found (neither 5x.txt nor 5m.txt)."
              echo "file_valid=false" >> $GITHUB_OUTPUT
              echo "verification_error=The archive '$FILE_NAME' does not contain a valid version file (version_5x.txt or version_5m.txt)." >> $GITHUB_OUTPUT
              rm -rf "$EXTRACT_DIR"
              rm -f "/tmp/config.tar.gz"
              exit 0
            fi
          fi

          echo "file_valid=true" >> $GITHUB_OUTPUT
          echo "verification_error=" >> $GITHUB_OUTPUT
          echo "version_outdated=$VERSION_OUTDATED" >> $GITHUB_OUTPUT
          echo "version_check_message=$VERSION_CHECK_MESSAGE" >> $GITHUB_OUTPUT

          rm -rf "$EXTRACT_DIR"
          rm -f "/tmp/config.tar.gz"

      - name: Handle successful and valid attachment
        if: steps.check_attachment.outputs.attachment_found == 'true' && steps.check_attachment.outputs.file_accessible == 'true' && steps.verify_archive.outputs.file_valid == 'true'
        uses: actions/github-script@v6
        env:
          VERSION_OUTDATED: ${{ steps.verify_archive.outputs.version_outdated }}
          VERSION_CHECK_MESSAGE: ${{ steps.verify_archive.outputs.version_check_message }}
          FILE_NAME: ${{ steps.check_attachment.outputs.file_name }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            const versionOutdated = process.env.VERSION_OUTDATED === 'true';
            const versionMessage = process.env.VERSION_CHECK_MESSAGE || '';
            const fileName = process.env.FILE_NAME || 'config.tar.gz';

            if (versionOutdated) {
              if (issue.data.state === 'open') {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: 'closed'
                });
              }

              let commentBody = '✅ **Archive Check Passed** / **Проверка архива пройдена**\n';
              commentBody += `The file \`${fileName}\` is valid. / Файл \`${fileName}\` корректен.\n\n`;

              commentBody += `🔴 **Action Required / Требуется действие:** ${versionMessage}\n\n`;

              commentBody += '🚫 **Issue Status / Статус тикета:**\n';
              commentBody += 'This issue will remain **closed** until the mod is updated to the latest version.\n';
              commentBody += 'Тикет останется **закрытым** до обновления мода до последней версии.\n\n';

              commentBody += '🔄 **Please update your mod first! / Сначала обновите мод!**\n';
              commentBody += '- Update guide (English): https://wiki.zmod.link/Setup/#updating-the-mod\n';
              commentBody += '- Инструкция по обновлению (Русский): https://wiki.zmod.link/ru/Setup/#обновление-мода\n\n';

              commentBody += 'After updating, please **edit this issue** (no need to create a new one). The check will run again and reopen it if the version matches.\n';
              commentBody += 'После обновления **отредактируйте этот тикет** (создавать новый не нужно). Проверка запустится снова и откроет его, если версия совпадает.';
              commentBody += '\nhttps://wiki.zmod.link/Help/\nhttps://wiki.zmod.link/ru/Help/';

              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner,
                repo,
                body: commentBody
              });
            }
            else {
              if (issue.data.state === 'closed') {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: 'open'
                });
              }

              let commentBody = '✅ **Perfect!** The file `' + fileName + '` has been found, is accessible, and contains the required structure.\n\n';
              commentBody += '✅ **Отлично!** Файл `' + fileName + '` найден, доступен и имеет корректную структуру.\n\n';
              commentBody += `**Version Check / Проверка версии:** ${versionMessage}\n\n`;
              commentBody += 'The issue has been (re)opened and will be processed. / Тикет был (пере)открыт и будет обработан.';
              commentBody += '\nhttps://wiki.zmod.link/ru/Help/\nhttps://wiki.zmod.link/Help/';

              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner,
                repo,
                body: commentBody
              });
            }

      - name: Handle bambufy plugin detection
        if: steps.verify_archive.outputs.bambufy_detected == 'true'
        uses: actions/github-script@v6
        env:
          FILE_NAME: ${{ steps.check_attachment.outputs.file_name }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            if (issue.data.state === 'open') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }

            const fileName = process.env.FILE_NAME || 'config.tar.gz';

            let commentBody = '❌ **Bambufy Plugin Detected** / **Обнаружен плагин Bambufy**\n\n';
            commentBody += `The file \`${fileName}\` was found and downloaded, but the \`console.log\` contains references to **bambufy**.\n\n`;
            commentBody += `Файл \`${fileName}\` найден и скачан, но \`console.log\` содержит упоминания **bambufy**.\n\n`;
            commentBody += '**You are using the bambufy plugin, please disable it or [contact the plugin author](https://github.com/function3d/bambufy).**\n\n';
            commentBody += '**Вы используете плагин bambufy, отключите его или [обратитесь к автору плагина](https://github.com/function3d/bambufy).**\n\n';
            commentBody += '🚫 **Issue Status / Статус тикета:**\n';
            commentBody += 'This issue has been **closed**.\n';
            commentBody += 'Тикет был **закрыт**.\n\n';
            commentBody += '🔧 **How to fix / Как исправить:**\n';
            commentBody += '1. Disable the bambufy plugin from your mod setup\n';
            commentBody += '2. Create a new `config*.tar.gz` file without bambufy references\n';
            commentBody += '3. Edit this issue and attach the corrected file\n\n';
            commentBody += '1. Отключите или удалите плагин bambufy из вашей модификации\n';
            commentBody += '2. Создайте новый файл `config*.tar.gz` без упоминаний bambufy\n';
            commentBody += '3. Отредактируйте этот тикет и прикрепите исправленный файл\n\n';
            commentBody += '\nhttps://wiki.zmod.link/ru/Help/\nhttps://wiki.zmod.link/ru/Help/';

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner,
              repo,
              body: commentBody
            });

      - name: Handle lesswaste plugin detection
        if: steps.verify_archive.outputs.lesswaste_detected == 'true'
        uses: actions/github-script@v6
        env:
          FILE_NAME: ${{ steps.check_attachment.outputs.file_name }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            if (issue.data.state === 'open') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }

            const fileName = process.env.FILE_NAME || 'config.tar.gz';

            let commentBody = '❌ **lesswaste Plugin Detected** / **Обнаружен плагин lesswaste**\n\n';
            commentBody += `The file \`${fileName}\` was found and downloaded, but the \`console.log\` contains references to **lesswaste**.\n\n`;
            commentBody += `Файл \`${fileName}\` найден и скачан, но \`console.log\` содержит упоминания **lesswaste**.\n\n`;
            commentBody += '**You are using the lesswaste plugin, please disable it or [contact the plugin author](https://github.com/Hrybmo/lesswaste).**\n\n';
            commentBody += '**Вы используете плагин lesswaste, отключите его или [обратитесь к автору плагина](https://github.com/Hrybmo/lesswaste).**\n\n';
            commentBody += '🚫 **Issue Status / Статус тикета:**\n';
            commentBody += 'This issue has been **closed**.\n';
            commentBody += 'Тикет был **закрыт**.\n\n';
            commentBody += '🔧 **How to fix / Как исправить:**\n';
            commentBody += '1. Disable the lesswaste plugin from your mod setup\n';
            commentBody += '2. Create a new `config*.tar.gz` file without lesswaste references\n';
            commentBody += '3. Edit this issue and attach the corrected file\n\n';
            commentBody += '1. Отключите или удалите плагин lesswaste из вашей модификации\n';
            commentBody += '2. Создайте новый файл `config*.tar.gz` без упоминаний lesswaste\n';
            commentBody += '3. Отредактируйте этот тикет и прикрепите исправленный файл\n\n';
            commentBody += '\nhttps://wiki.zmod.link/ru/Help/\nhttps://wiki.zmod.link/ru/Help/';

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner,
              repo,
              body: commentBody
            });

      - name: Handle missing, inaccessible, or invalid attachment
        if: steps.check_attachment.outputs.attachment_found != 'true' || steps.check_attachment.outputs.file_accessible != 'true' || (steps.verify_archive.outputs.file_valid != 'true' && steps.verify_archive.outputs.file_valid != '' && steps.verify_archive.outputs.bambufy_detected != 'true' && steps.verify_archive.outputs.lesswaste_detected != 'true')
        uses: actions/github-script@v6
        env:
          ATTACHMENT_FOUND: ${{ steps.check_attachment.outputs.attachment_found }}
          FILE_ACCESSIBLE: ${{ steps.check_attachment.outputs.file_accessible }}
          VERIFICATION_ERROR: ${{ steps.verify_archive.outputs.verification_error }}
          FILE_NAME: ${{ steps.check_attachment.outputs.file_name }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            let commentBody = '';
            const attachmentFound = process.env.ATTACHMENT_FOUND === 'true';
            const fileAccessible = process.env.FILE_ACCESSIBLE === 'true';
            const verificationError = process.env.VERIFICATION_ERROR || 'Unknown archive error.';
            const fileName = process.env.FILE_NAME || 'config.tar.gz';

            if (issue.data.state === 'open') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }

            if (!attachmentFound) {
              commentBody = '❌ **Error!** No `config*.tar.gz` file was found in the issue.\n\n❌ **Ошибка!** Файл `config*.tar.gz` не найден в тикете.\n\n';
            } else if (!fileAccessible) {
              commentBody = `⚠️ **Warning!** The file \`${fileName}\` was found in the issue but is not accessible for download.\n\n⚠️ **Предупреждение!** Файл \`${fileName}\` найден в тикете, но недоступен для скачивания.\n\n`;
            } else {
              commentBody = `🔍 **Archive Content Issue!** The file \`${fileName}\` was found and downloaded, but it does not meet the requirements.\n\n`;
              commentBody += `**Details:** ${verificationError}\n\n`;
              commentBody += `🔍 **Проблема с содержимым архива!** Файл \`${fileName}\` найден и скачан, но не соответствует требованиям.\n\n`;
              commentBody += `**Подробности:** ${verificationError}\n\n`;
            }

            commentBody += '🔧 **You can fix this by:**\n1. Click "Edit" on your original issue comment\n2. Ensure you attach a **correct** `config*.tar.gz` file (it must contain `opt/config/mod_data/log/console.log` and a valid version file)\n3. Save the changes\n\n';
            commentBody += '🔧 **Вы можете исправить это:**\n1. Нажмите "Edit" (редактировать) на вашем исходном сообщении\n2. Убедитесь, что вы прикрепляете **правильный** файл `config*.tar.gz` (он должен содержать `opt/config/mod_data/log/console.log` и корректный файл версии)\n3. Сохраните изменения\n\n';
            commentBody += '🔄 After editing, this check will run again automatically.\n🔄 После редактирования эта проверка запустится автоматически снова.';
            commentBody += '\nhttps://wiki.zmod.link/ru/Help/\nhttps://wiki.zmod.link/Help/';

            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner,
              repo,
              body: commentBody
            });
